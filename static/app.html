<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wallbox">
<meta name="theme-color" content="#161b22">
<title>Wallbox</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --muted:   #8b949e;
  --text:    #e6edf3;
  --blue:    #1f6feb;
  --green:   #238636;
  --red:     #da3633;
  --yellow:  #f0c020;
  --cyan:    #06b6d4;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.hdr-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 1.05rem; font-weight: 600;
}
.hdr-right { display: flex; align-items: center; gap: 10px; }
.conn-chip {
  font-size: 0.72rem; font-weight: 600;
  padding: 3px 9px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px;
  border: 1px solid transparent;
}
.chip-backend { background: #0d2d0d; border-color: #238636; color: #4ade80; }
.chip-bridge  { background: #2d2200; border-color: #ca8a04; color: #fbbf24; }
.chip-offline { background: #2d0d0d; border-color: var(--red); color: #f87171; }
.chip-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

.btn-settings {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 6px 10px; cursor: pointer; font-size: 1.1rem;
  transition: background .15s;
}
.btn-settings:hover { background: #21262d; }

/* ── Scroll area ── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Mode toggle ── */
.mode-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.mode-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  user-select: none;
}
.mode-card.active.manual { border-color: var(--cyan); background: #0c1e26; }
.mode-card.active.auto   { border-color: var(--yellow); background: #1e1a00; }
.mode-card-icon { font-size: 1.8rem; margin-bottom: 6px; }
.mode-card-label { font-size: 0.88rem; font-weight: 600; color: var(--muted); }
.mode-card.active .mode-card-label { color: var(--text); }

/* ── Status card ── */
.status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.status-main {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--cyan);
  line-height: 1;
  margin-bottom: 4px;
}
.status-main .unit { font-size: 1rem; font-weight: 400; color: var(--muted); }
.status-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
.status-row { display: flex; justify-content: space-between; align-items: baseline; }
.status-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing:.05em; }

/* ── Auto info ── */
.auto-info {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.88rem;
  border-bottom: 1px solid #21262d;
  padding-bottom: 8px;
}
.info-row:last-child { border-bottom: none; padding-bottom: 0; }
.info-row .lbl { color: var(--muted); }
.info-row .val { font-weight: 600; }
.clr-ok  { color: #4ade80; }
.clr-off { color: #f87171; }
.reason-box {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.4;
  margin-top: 4px;
}

/* ── Manual controls ── */
.ctrl-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.ctrl-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  margin-bottom: 14px;
}

.presets {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.preset-btn {
  background: #21262d;
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  padding: 14px 8px;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  text-align: center;
  user-select: none;
}
.preset-btn:active { background: #30363d; }
.preset-btn.selected { border-color: var(--cyan); color: var(--cyan); background: #0c1e26; }
.preset-btn.stop-btn { border-color: #6e3a3a; color: #f87171; }
.preset-btn.stop-btn.selected { background: #2d0d0d; }

.slider-wrap { margin-bottom: 16px; }
.slider-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.slider-val { font-size: 1.5rem; font-weight: 700; color: var(--cyan); }
.slider-bounds { font-size: 0.78rem; color: var(--muted); }

input[type="range"] {
  width: 100%; height: 6px;
  -webkit-appearance: none;
  background: #21262d; border-radius: 3px; outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%; background: var(--cyan); cursor: pointer;
  box-shadow: 0 0 0 4px rgba(6,182,212,.15);
}

.btn-apply {
  width: 100%; padding: 16px;
  background: var(--green); border: none; border-radius: 12px;
  color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: background .12s; margin-bottom: 10px;
}
.btn-apply:active { background: #2ea043; }

/* ── Offline / config prompt ── */
.offline-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 16px;
  text-align: center;
}
.offline-icon { font-size: 2.5rem; margin-bottom: 12px; }
.offline-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
.offline-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
.btn-config {
  margin-top: 16px; padding: 12px 24px;
  background: var(--blue); border: none; border-radius: 10px;
  color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer;
}

/* ── Settings overlay ── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.7);
  display: flex; align-items: flex-end;
}
.settings-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  width: 100%;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
}
.sheet-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.sheet-title { font-size: 1.05rem; font-weight: 600; }
.btn-close {
  background: #21262d; border: none; border-radius: 8px;
  color: var(--muted); width: 32px; height: 32px;
  font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
.field input {
  width: 100%; padding: 12px 14px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 0.95rem; outline: none;
}
.field input:focus { border-color: var(--blue); }
.field .hint { font-size: 0.75rem; color: var(--muted); margin-top: 5px; line-height: 1.4; }

.btn-save {
  width: 100%; padding: 14px;
  background: var(--blue); border: none; border-radius: 12px;
  color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="hdr-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f0c020" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    Wallbox
  </div>
  <div class="hdr-right">
    <div class="conn-chip chip-offline" id="conn-chip">
      <span class="chip-dot"></span>
      <span id="conn-label">Verbinde…</span>
    </div>
    <button class="btn-settings" onclick="openSettings()" title="Einstellungen">⚙</button>
  </div>
</header>

<main id="main-content">
  <div class="offline-box" id="connecting-box">
    <div class="offline-icon">⚡</div>
    <div class="offline-title">Verbinde…</div>
    <div class="offline-sub">Suche Backend und Direkt-Bridge.</div>
  </div>
</main>

<!-- Settings overlay -->
<div class="overlay hidden" id="settings-overlay">
  <div class="settings-sheet">
    <div class="sheet-header">
      <span class="sheet-title">Einstellungen</span>
      <button class="btn-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="field">
      <label>Backend-URL (FastAPI-Server)</label>
      <input type="url" id="cfg-backend" placeholder="http://192.168.x.x:8000">
      <div class="hint">URL des laufenden wallbox-solar-controller Servers.</div>
    </div>
    <div class="field">
      <label>Bridge-URL (Direkt-Modus, kein Backend nötig)</label>
      <input type="url" id="cfg-bridge" placeholder="http://192.168.x.x:8001">
      <div class="hint">URL von <code>python bridge.py</code> – läuft auf jedem Laptop im selben Netz. Nur manuelle Steuerung, kein PV-Automatik.</div>
    </div>
    <button class="btn-save" onclick="saveSettings()">Speichern &amp; Verbinden</button>
  </div>
</div>

<script>
"use strict";

// ── Config ───────────────────────────────────────────────────────────────────

const DEFAULT_BACKEND = `http://${location.hostname}:8000`;
const DEFAULT_BRIDGE  = `http://${location.hostname}:8001`;

function loadCfg() {
  return {
    backendUrl: localStorage.getItem('backendUrl') || DEFAULT_BACKEND,
    bridgeUrl:  localStorage.getItem('bridgeUrl')  || DEFAULT_BRIDGE,
  };
}

function saveCfg(cfg) {
  localStorage.setItem('backendUrl', cfg.backendUrl);
  localStorage.setItem('bridgeUrl',  cfg.bridgeUrl);
}

// ── State ────────────────────────────────────────────────────────────────────

let conn     = 'offline'; // 'backend' | 'bridge' | 'offline'
let mode     = 'manual';
let selAmps  = 6;
let pollTimer = null;
let sse       = null;

// ── Connection ───────────────────────────────────────────────────────────────

async function detect() {
  const cfg = loadCfg();
  const to  = 3000;

  try {
    const r = await fetch(cfg.backendUrl + '/api/state', { signal: AbortSignal.timeout(to) });
    if (r.ok) return 'backend';
  } catch {}

  try {
    const r = await fetch(cfg.bridgeUrl + '/status', { signal: AbortSignal.timeout(to) });
    if (r.ok) return 'bridge';
  } catch {}

  return 'offline';
}

async function connect() {
  stopPolling();
  conn = await detect();
  setChip(conn);

  if (conn === 'backend') {
    const cfg = loadCfg();
    const r = await fetch(cfg.backendUrl + '/api/state');
    const state = await r.json();
    renderBackend(state);
    startSSE();
  } else if (conn === 'bridge') {
    await pollBridge();
    startPolling();
  } else {
    renderOffline();
  }
}

function setChip(c) {
  const chip  = document.getElementById('conn-chip');
  const label = document.getElementById('conn-label');
  chip.className = 'conn-chip ' + ({
    backend: 'chip-backend',
    bridge:  'chip-bridge',
    offline: 'chip-offline',
  }[c] || 'chip-offline');
  label.textContent = { backend: 'Backend', bridge: 'Direkt', offline: 'Offline' }[c] || c;
}

// ── SSE (backend mode) ───────────────────────────────────────────────────────

function startSSE() {
  if (sse) sse.close();
  const cfg = loadCfg();
  sse = new EventSource(cfg.backendUrl + '/api/stream');
  sse.onmessage = ev => {
    try { renderBackend(JSON.parse(ev.data)); } catch {}
  };
  sse.onerror = () => {
    sse.close(); sse = null;
    setTimeout(connect, 5000);
  };
}

// ── Polling (bridge mode) ────────────────────────────────────────────────────

function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollBridge, 4000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (sse)       { sse.close(); sse = null; }
}

async function pollBridge() {
  const cfg = loadCfg();
  try {
    const r = await fetch(cfg.bridgeUrl + '/status', { signal: AbortSignal.timeout(3000) });
    if (!r.ok) throw new Error();
    renderBridge(await r.json());
  } catch {
    conn = 'offline';
    setChip('offline');
    renderOffline();
    stopPolling();
    setTimeout(connect, 6000);
  }
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderOffline() {
  const m = document.getElementById('main-content');
  m.innerHTML = `
    <div class="offline-box">
      <div class="offline-icon">📡</div>
      <div class="offline-title">Keine Verbindung</div>
      <div class="offline-sub">
        Backend und Bridge sind nicht erreichbar.<br>
        Bitte URLs in den Einstellungen prüfen.
      </div>
      <button class="btn-config" onclick="openSettings()">Einstellungen öffnen</button>
    </div>`;
}

function renderBackend(state) {
  mode = state.mode || 'manual';
  const e = state.ebox    || {};
  const d = state.decision || {};
  const n = state.neoom   || {};

  const cAvg = avg(e.current_l1, e.current_l2, e.current_l3);
  const kw   = cAvg != null ? (cAvg * 3 * 230 / 1000).toFixed(2) : null;

  let html = `
    <div class="mode-row">
      <div class="mode-card manual ${mode==='manual'?'active':''}" onclick="setMode('manual')">
        <div class="mode-card-icon">🎛</div>
        <div class="mode-card-label">Manuell</div>
      </div>
      <div class="mode-card auto ${mode==='auto'?'active':''}" onclick="setMode('auto')">
        <div class="mode-card-icon">☀️</div>
        <div class="mode-card-label">PV-Automatik</div>
      </div>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Ist-Strom</span>
        <span class="status-label">Wallbox</span>
      </div>
      <div class="status-row" style="margin-top:4px">
        <div class="status-main">${cAvg != null ? cAvg.toFixed(1) : '—'}<span class="unit"> A</span></div>
        <div class="status-main" style="color:var(--yellow)">${kw != null ? kw : '—'}<span class="unit"> kW</span></div>
      </div>
      ${n.pv_power_w != null ? `<div class="status-sub" style="margin-top:8px">PV: ${(n.pv_power_w/1000).toFixed(1)} kW &nbsp;·&nbsp; Netz: ${fmtGrid(n.grid_power_signed_w)}</div>` : ''}
    </div>`;

  if (mode === 'auto' && d.reason) {
    html += `
      <div class="auto-info">
        <div class="info-row"><span class="lbl">Überschuss</span><span class="val">${d.surplus_w_smoothed != null ? Math.round(d.surplus_w_smoothed)+' W' : '—'}</span></div>
        <div class="info-row"><span class="lbl">Ladefreigabe</span><span class="val ${d.charge_enabled?'clr-ok':'clr-off'}">${d.charge_enabled?'Ja':'Nein'}</span></div>
        <div class="info-row"><span class="lbl">Zielstrom</span><span class="val">${d.recommended_amps != null ? d.recommended_amps.toFixed(1)+' A' : '—'}</span></div>
        <div class="reason-box">${d.reason || ''}</div>
      </div>`;
  }

  if (mode === 'manual') {
    html += manualControlsHtml(e.limit_l1);
  }

  document.getElementById('main-content').innerHTML = html;
}

function renderBridge(status) {
  const l1 = status.current_l1, l2 = status.current_l2, l3 = status.current_l3;
  const cAvg = avg(l1, l2, l3);
  const kw   = cAvg != null ? (cAvg * 3 * 230 / 1000).toFixed(2) : null;

  let html = `
    <div class="offline-box" style="text-align:left;padding:12px 16px">
      <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Direkt-Modus – kein Backend</div>
      <div style="font-size:0.82rem;color:var(--muted)">PV-Automatik nicht verfügbar. Nur manuelle Steuerung.</div>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Ist-Strom (Ø)</span>
        <span class="status-label">Ladeleistung</span>
      </div>
      <div class="status-row" style="margin-top:4px">
        <div class="status-main">${cAvg != null ? cAvg.toFixed(1) : '—'}<span class="unit"> A</span></div>
        <div class="status-main" style="color:var(--yellow)">${kw != null ? kw : '—'}<span class="unit"> kW</span></div>
      </div>
      <div class="status-sub" style="margin-top:8px">Limit: ${status.limit_l1 != null ? status.limit_l1.toFixed(1)+' A' : '—'} &nbsp;·&nbsp; Fallback: ${status.fallback_l1 != null ? status.fallback_l1.toFixed(1)+' A' : '—'}</div>
    </div>
    ${manualControlsHtml(status.limit_l1)}`;

  document.getElementById('main-content').innerHTML = html;
}

function manualControlsHtml(currentLimit) {
  const cur = currentLimit != null ? currentLimit : selAmps;
  return `
    <div class="ctrl-card">
      <div class="ctrl-title">Ladestrom setzen</div>
      <div class="presets">
        <button class="preset-btn stop-btn ${cur < 0.5 ? 'selected' : ''}" onclick="selectAmps(0)">Stopp<br><small>0 A</small></button>
        ${[6,8,10,13,16].map(a =>
          `<button class="preset-btn ${Math.abs(cur - a) < 0.3 ? 'selected' : ''}" onclick="selectAmps(${a})">${a} A</button>`
        ).join('')}
      </div>
      <div class="slider-wrap">
        <div class="slider-header">
          <span class="slider-bounds">6 A</span>
          <span class="slider-val" id="slider-val">${selAmps.toFixed(1)} A</span>
          <span class="slider-bounds">16 A</span>
        </div>
        <input type="range" id="amp-slider" min="6" max="16" step="0.5" value="${selAmps}"
          oninput="onSlider(this.value)">
      </div>
      <button class="btn-apply" onclick="applyAmps()">⚡ Anwenden</button>
    </div>`;
}

// ── Actions ──────────────────────────────────────────────────────────────────

function selectAmps(a) {
  selAmps = a;
  const sl = document.getElementById('amp-slider');
  const sv = document.getElementById('slider-val');
  if (sl && a >= 6) sl.value = a;
  if (sv) sv.textContent = a.toFixed(1) + ' A';
  document.querySelectorAll('.preset-btn').forEach(b => {
    const ba = parseFloat(b.dataset.a || b.textContent);
    b.classList.toggle('selected', Math.abs(ba - a) < 0.3);
  });
}

function onSlider(v) {
  selAmps = parseFloat(v);
  const sv = document.getElementById('slider-val');
  if (sv) sv.textContent = selAmps.toFixed(1) + ' A';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
}

async function applyAmps() {
  const cfg = loadCfg();
  try {
    if (conn === 'backend') {
      await fetch(cfg.backendUrl + '/api/manual', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amps: selAmps }),
      });
    } else if (conn === 'bridge') {
      await fetch(cfg.bridgeUrl + '/set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amps: selAmps }),
      });
      await pollBridge();
    }
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function setMode(m) {
  if (conn !== 'backend') return;
  const cfg = loadCfg();
  await fetch(cfg.backendUrl + '/api/mode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: m }),
  });
  mode = m;
}

// ── Settings ─────────────────────────────────────────────────────────────────

function openSettings() {
  const cfg = loadCfg();
  document.getElementById('cfg-backend').value = cfg.backendUrl;
  document.getElementById('cfg-bridge').value  = cfg.bridgeUrl;
  document.getElementById('settings-overlay').classList.remove('hidden');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}

function saveSettings() {
  saveCfg({
    backendUrl: document.getElementById('cfg-backend').value.replace(/\/+$/, ''),
    bridgeUrl:  document.getElementById('cfg-bridge').value.replace(/\/+$/, ''),
  });
  closeSettings();
  connect();
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function avg(...vs) {
  const valid = vs.filter(v => v != null);
  return valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : null;
}

function fmtGrid(w) {
  if (w == null) return '—';
  if (w < -5)  return `${Math.abs(w).toFixed(0)} W ↑`;
  if (w > 5)   return `${w.toFixed(0)} W ↓`;
  return '~0 W';
}
