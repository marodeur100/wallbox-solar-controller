name: Build Android APK

on:
  push:
    paths:
      - 'mobile_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip python3-pip \
            autoconf libtool \
            libltdl-dev libffi-dev libssl-dev \
            build-essential ccache

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==3.0.11

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('mobile_app/buildozer.spec') }}
          restore-keys: buildozer-

      - name: Set up Android SDK in buildozer directory
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"

          # Skip download if already in cache
          if [ ! -f "$SDKMANAGER" ]; then
            mkdir -p "$SDK/cmdline-tools"
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
              -O /tmp/clt.zip
            unzip -q /tmp/clt.zip -d /tmp/clt_extract
            rm -rf "$SDK/cmdline-tools/latest"
            mv /tmp/clt_extract/cmdline-tools "$SDK/cmdline-tools/latest"
          fi

          # Accept licenses (idempotent)
          yes | "$SDKMANAGER" --sdk_root="$SDK" --licenses || true

          # Install required components if missing
          "$SDKMANAGER" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" || true

          # Compatibility shim for old sdkmanager path
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDKMANAGER" "$SDK/tools/bin/sdkmanager"

      - name: Build APK
        working-directory: mobile_app
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wallbox-apk
          path: mobile_app/bin/*.apk
          retention-days: 90
