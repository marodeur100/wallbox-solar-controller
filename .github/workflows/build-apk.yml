name: Build Android APK

on:
  push:
    paths:
      - 'mobile_app/**'
  workflow_dispatch:   # auch manuell auslösbar

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip python3-pip \
            openjdk-17-jdk autoconf libtool \
            libltdl-dev libffi-dev libssl-dev \
            build-essential ccache

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==3.0.11

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('mobile_app/buildozer.spec') }}
          restore-keys: buildozer-

      - name: Set up Android SDK in buildozer directory
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/cmdline-tools"

          # Download Android command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/clt.zip
          unzip -q /tmp/clt.zip -d /tmp/clt_extract
          mv /tmp/clt_extract/cmdline-tools "$SDK/cmdline-tools/latest"

          # Accept all licenses
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$SDK" --licenses || true

          # Install required SDK components
          "$SDK/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          # Compatibility shim – buildozer still looks for sdkmanager here
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "$SDK/tools/bin/sdkmanager"

      - name: Build APK
        working-directory: mobile_app
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wallbox-apk
          path: mobile_app/bin/*.apk
          retention-days: 30
