name: Build Android APK

on:
  push:
    paths:
      - 'mobile_app/**'
  workflow_dispatch:   # auch manuell auslösbar

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip python3-pip \
            openjdk-17-jdk autoconf libtool \
            libltdl-dev libffi-dev libssl-dev \
            build-essential ccache

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('mobile_app/buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK
        working-directory: mobile_app
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wallbox-apk
          path: mobile_app/bin/*.apk
          retention-days: 30
